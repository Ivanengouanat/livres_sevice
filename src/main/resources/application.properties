spring.application.name=demo

spring.datasource.url=jdbc:postgresql://postgres:5432/livresdb
spring.datasource.username=livresuser
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Autoriser le frontend React
spring.web.cors.allowed-origin-patterns=http://localhost:3000, http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

